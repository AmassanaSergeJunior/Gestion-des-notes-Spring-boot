<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Classement</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo" th:href="@{/}"><div class="logo-icon">📚</div><span>GestionNotes</span></a>
            <ul class="nav-links">
                <li><a th:href="@{/}">Accueil</a></li>
                <li><a th:href="@{/etudiants}">Étudiants</a></li>
                <li><a th:href="@{/matieres}">Matières</a></li>
                <li><a th:href="@{/notes}">Notes</a></li>
                <li><a th:href="@{/resultats}" class="active">Résultats</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">🏆 Classement Général</h1>
            <div style="display: flex; gap: 1rem;">
                <a th:href="@{/resultats/admis}" class="btn btn-secondary">✅ Admis</a>
                <a th:href="@{/resultats/statistiques}" class="btn btn-secondary">📊 Stats</a>
            </div>
        </div>
        <div class="table-container" th:if="${!resultats.isEmpty()}">
            <table>
                <thead>
                    <tr>
                        <th>Rang</th>
                        <th>Matricule</th>
                        <th>Nom</th>
                        <th>Prénom</th>
                        <th>Moyenne</th>
                        <th>Statut</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r, i : ${resultats}">
                        <td>
                            <span th:if="${i.index == 0}" style="font-size: 1.5rem;">🥇</span>
                            <span th:if="${i.index == 1}" style="font-size: 1.5rem;">🥈</span>
                            <span th:if="${i.index == 2}" style="font-size: 1.5rem;">🥉</span>
                            <span th:if="${i.index > 2}" th:text="${i.index + 1}"></span>
                        </td>
                        <td th:text="${r.matricule}"></td>
                        <td th:text="${r.nom}"></td>
                        <td th:text="${r.prenom}"></td>
                        <td><strong th:text="${#numbers.formatDecimal(r.moyenne, 1, 2)}"></strong></td>
                        <td>
                            <span th:if="${r.moyenne >= 16}" class="badge badge-success">Très Bien</span>
                            <span th:if="${r.moyenne >= 14 && r.moyenne < 16}" class="badge badge-success">Bien</span>
                            <span th:if="${r.moyenne >= 12 && r.moyenne < 14}" class="badge badge-warning">Assez Bien</span>
                            <span th:if="${r.moyenne >= 10 && r.moyenne < 12}" class="badge badge-warning">Passable</span>
                            <span th:if="${r.moyenne < 10}" class="badge badge-danger">Ajourné</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="table-container" th:if="${resultats.isEmpty()}">
            <div class="empty-state">
                <div class="empty-state-icon">📊</div>
                <div class="empty-state-text">Aucun résultat</div>
            </div>
        </div>
    </div>
</body>
</html>
