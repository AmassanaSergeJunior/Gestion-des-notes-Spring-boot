<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouvelle Matière</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2D3561; --accent: #F4845F; --bg: #FAFBFC; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); }
        nav { background: linear-gradient(135deg, var(--primary) 0%, #1e2342 100%); padding: 1.2rem 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 800; color: white; text-decoration: none; display: flex; align-items: center; gap: 0.8rem; }
        .logo-icon { width: 42px; height: 42px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .nav-links { display: flex; gap: 0.5rem; list-style: none; }
        .nav-links a { color: rgba(255, 255, 255, 0.85); text-decoration: none; padding: 0.7rem 1.3rem; border-radius: 10px; font-weight: 500; transition: all 0.3s; }
        .nav-links a:hover { color: white; background: rgba(255, 255, 255, 0.1); }
        .nav-links a.active { background: var(--accent); color: white; }
        .container { max-width: 1400px; margin: 0 auto; padding: 3rem 2rem; }
        .page-title { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 800; color: var(--primary); margin-bottom: 2rem; }
        .form-card { background: white; border-radius: 20px; padding: 3rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 600px; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--primary); }
        .form-group input { width: 100%; padding: 0.9rem 1.2rem; border: 2px solid #E5E7EB; border-radius: 10px; font-size: 1rem; font-family: 'Poppins', sans-serif; }
        .form-group input:focus { outline: none; border-color: var(--accent); }
        .form-actions { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn { padding: 0.9rem 2rem; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; text-decoration: none; font-family: 'Poppins', sans-serif; display: inline-block; }
        .btn-primary { background: linear-gradient(135deg, var(--accent) 0%, #e36640 100%); color: white; }
        .btn-secondary { background: white; color: var(--primary); border: 2px solid var(--primary); }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a th:href="@{/}" class="logo"><div class="logo-icon">📚</div><span>GestionNotes</span></a>
            <ul class="nav-links">
                <li><a th:href="@{/}">Accueil</a></li>
                <li><a th:href="@{/etudiants}">Étudiants</a></li>
                <li><a th:href="@{/matieres}" class="active">Matières</a></li>
                <li><a th:href="@{/notes}">Notes</a></li>
                <li><a th:href="@{/resultats}">Résultats</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <h1 class="page-title">➕ Nouvelle Matière</h1>
        <div class="form-card">
            <form th:action="@{/matieres/save}" th:object="${matiere}" method="post">
                <div class="form-group">
                    <label for="code">Code</label>
                    <input type="text" id="code" th:field="*{code}" required placeholder="Ex: MATH02">
                </div>
                <div class="form-group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" th:field="*{nom}" required placeholder="Ex: Algèbre">
                </div>
                <div class="form-group">
                    <label for="coef">Coefficient</label>
                    <input type="number" id="coef" th:field="*{coef}" step="0.1" min="0.1" required placeholder="Ex: 3">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
                    <a th:href="@{/matieres}" class="btn btn-secondary">↩️ Annuler</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
