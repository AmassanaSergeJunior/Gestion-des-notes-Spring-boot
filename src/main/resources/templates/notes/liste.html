<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Notes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/" class="logo" th:href="@{/}"><div class="logo-icon">📚</div><span>GestionNotes</span></a>
            <ul class="nav-links">
                <li><a th:href="@{/}">Accueil</a></li>
                <li><a th:href="@{/etudiants}">Étudiants</a></li>
                <li><a th:href="@{/matieres}">Matières</a></li>
                <li><a th:href="@{/notes}" class="active">Notes</a></li>
                <li><a th:href="@{/resultats}">Résultats</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div class="page-header">
            <h1 class="page-title">📝 Notes</h1>
            <a th:href="@{/notes/nouveau}" class="btn btn-primary">➕ Ajouter une note</a>
        </div>
        <div class="table-container" th:if="${!notes.isEmpty()}">
            <table>
                <thead>
                    <tr><th>Étudiant</th><th>Matière</th><th>Note</th></tr>
                </thead>
                <tbody>
                    <tr th:each="n : ${notes}">
                        <td th:text="${n.etudiant.prenom + ' ' + n.etudiant.nom}"></td>
                        <td th:text="${n.matiere.nom}"></td>
                        <td><strong th:text="${n.valeur}"></strong></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="table-container" th:if="${notes.isEmpty()}">
            <div class="empty-state">
                <div class="empty-state-icon">📝</div>
                <div class="empty-state-text">Aucune note enregistrée</div>
                <a th:href="@{/notes/nouveau}" class="btn btn-primary">Ajouter la première note</a>
            </div>
        </div>
    </div>
</body>
</html>
