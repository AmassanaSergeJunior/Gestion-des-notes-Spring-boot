


# Configuration MySQL avec XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_notes?useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Configuration H2 Console (pour visualiser la BD)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuration de l'application
spring.application.name=gestion-notes